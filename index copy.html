<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warship Defender: Alien Invasion</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; cursor: none; }
        #game-container { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%); position: relative; overflow: hidden; transition: filter 0.5s; }
        
        /* Câmera Lenta */
        .slow-mo { filter: sepia(0.5) hue-rotate(180deg) brightness(1.2); }

        /* HUD */
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 100; pointer-events: none; }
        .stat { font-size: 22px; font-weight: bold; text-shadow: 0 0 10px #00ff41; margin-bottom: 5px; }

        /* NAVE DE GUERRA (PLAYER) */
        #player {
            width: 60px; height: 80px; position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: #535c68; border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.2);
            z-index: 10; border: 2px solid #3d464d; pointer-events: none;
        }
        #player.gold { background: #ffd700; box-shadow: 0 0 30px #ffd700; border-color: #b8860b; }
        #player::before { content: ''; position: absolute; top: -15px; left: 15px; width: 30px; height: 30px; background: #747d8c; border-radius: 5px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); border: 2px solid #3d464d; }
        #player::after { content: ''; position: absolute; bottom: 0; left: -20px; width: 100px; height: 40px; background: #4a5159; border-radius: 5px; clip-path: polygon(0% 100%, 15% 0%, 85% 0%, 100% 100%); border: 2px solid #3d464d; z-index: -1; }
        .cannon { position: absolute; width: 8px; height: 25px; background: #3d464d; border-radius: 2px; top: 40px; }
        .cannon.left { left: -5px; } .cannon.right { right: -5px; }

        /* INIMIGO ALIENÍGENA */
        .alien { 
            width: 50px; height: 40px; position: absolute; 
            background: #2ecc71; /* Verde alien */
            clip-path: polygon(20% 0%, 80% 0%, 100% 40%, 80% 100%, 20% 100%, 0% 40%);
            box-shadow: inset 0 0 10px #000;
            z-index: 5;
        }
        /* Olhos do Alien */
        .alien::before, .alien::after {
            content: ''; position: absolute; top: 10px; width: 10px; height: 12px;
            background: #000; border-radius: 50%;
        }
        .alien::before { left: 10px; transform: rotate(-20deg); }
        .alien::after { right: 10px; transform: rotate(20deg); }

        /* TIROS */
        .bullet { width: 5px; height: 20px; background: #ffff00; position: absolute; box-shadow: 0 0 10px #ffff00; }
        .alien-laser { width: 4px; height: 15px; background: #e74c3c; position: absolute; box-shadow: 0 0 10px #e74c3c; border-radius: 2px; }

        /* METEORO */
        .meteor { position: absolute; background: #5d4037; border-radius: 50% 20% 50% 30%; box-shadow: inset -5px -5px 0 rgba(0,0,0,0.4); }

        #game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; z-index: 1000; background: rgba(0,0,0,0.9); padding: 50px; border: 3px solid #ff4757; border-radius: 20px; }
        button { padding: 15px 30px; background: #2ecc71; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="stat">SCORE: <span id="score">0</span></div>
        <div class="stat">VIDAS: <span id="lives">3</span></div>
        <div id="level-msg" style="color: #ffff00;">INVASÃO ALIEN INICIADA</div>
    </div>
    <div id="game-over">
        <h1>TERRA CONQUISTADA</h1>
        <button onclick="location.reload()">REVIDAR</button>
    </div>
    <div id="player">
        <div id="shield-visual" style="display:none; position:absolute; width:110px; height:110px; border:3px solid #00d2ff; border-radius:50%; top:-15px; left:-25px; box-shadow:0 0 15px #00d2ff;"></div>
        <div class="cannon left"></div>
        <div class="cannon right"></div>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const shieldVis = document.getElementById('shield-visual');
    let playerX = window.innerWidth / 2;
    let score = 0, lives = 3, level = 1, active = true, isShielded = false;
    let timeScale = 1;

    // CONTROLE MOUSE
    document.addEventListener('mousemove', (e) => {
        if (!active) return;
        playerX = e.clientX;
        playerX = Math.max(50, Math.min(window.innerWidth - 50, playerX));
        player.style.left = playerX + 'px';
    });

    // TIRO JOGADOR
    setInterval(() => {
        if (!active) return;
        createBullet(0);
        if(level >= 2) { createBullet(-25); createBullet(25); }
    }, 200);

    function createBullet(offset) {
        const b = document.createElement('div');
        b.className = 'bullet';
        b.style.left = (playerX + offset - 2) + 'px';
        b.style.bottom = '100px';
        container.appendChild(b);
        let pos = 100;
        const move = setInterval(() => {
            pos += 15; b.style.bottom = pos + 'px';
            document.querySelectorAll('.alien, .meteor').forEach(t => {
                if (checkCol(b, t)) {
                    explode(t);
                    t.remove(); b.remove(); clearInterval(move);
                    score += 100; updateUI();
                }
            });
            if (pos > window.innerHeight) { b.remove(); clearInterval(move); }
        }, 16);
    }

    // SPAWN ALIENS QUE ATIRAM
    function spawnAlien() {
        if (!active) return;
        const a = document.createElement('div');
        a.className = 'alien';
        a.style.left = Math.random() * (window.innerWidth - 50) + 'px';
        a.style.top = '-50px';
        container.appendChild(a);

        let y = -50;
        const move = setInterval(() => {
            y += 2.5 * timeScale;
            a.style.top = y + 'px';

            // Chance do Alien atirar
            if (Math.random() < 0.01 * timeScale) alienShoot(a);

            if (checkCol(a, player)) { takeDamage(); a.remove(); clearInterval(move); }
            if (y > window.innerHeight) { a.remove(); clearInterval(move); }
        }, 30);
    }

    function alienShoot(alien) {
        if (!alien.parentElement) return;
        const laser = document.createElement('div');
        laser.className = 'alien-laser';
        const rect = alien.getBoundingClientRect();
        laser.style.left = (rect.left + rect.width/2) + 'px';
        laser.style.top = rect.bottom + 'px';
        container.appendChild(laser);

        let ly = rect.bottom;
        const lMove = setInterval(() => {
            ly += 7 * timeScale;
            laser.style.top = ly + 'px';
            if (checkCol(laser, player)) { takeDamage(); laser.remove(); clearInterval(lMove); }
            if (ly > window.innerHeight) { laser.remove(); clearInterval(lMove); }
        }, 20);
    }
