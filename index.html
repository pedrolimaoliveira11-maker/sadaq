<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Sistemas de Vendas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #333; text-align: center; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #27ae60; }
        ul { list-style: none; padding: 0; }
        li {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        li:last-child { border-bottom: none; }
        li:hover { background: #fcfcfc; }
        .delete-btn {
            background-color: #ff7675;
            padding: 5px 10px;
            font-size: 12px;
        }
        .delete-btn:hover { background-color: #d63031; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistemas de Vendas</h2>
    
    <div class="input-group">
        <input type="text" id="sistemaInput" placeholder="Ex: RD Station CRM">
        <button onclick="adicionarItem()">Adicionar</button>
    </div>

    <ul id="listaSistemas">
        </ul>
</div>

<script>
    // Lista inicial
    let sistemas = ["RD Station CRM"];

    function renderizarLista() {
        const listaUl = document.getElementById('listaSistemas');
        listaUl.innerHTML = ''; // Limpa a lista antes de renderizar

        sistemas.forEach((item, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                ${item} 
                <button class="delete-btn" onclick="removerItem(${index})">Excluir</button>
            `;
            listaUl.appendChild(li);
        });
    }

    function adicionarItem() {
        const input = document.getElementById('sistemaInput');
        if (input.value.trim() !== "") {
            sistemas.push(input.value);
            input.value = ""; // Limpa o campo
            renderizarLista();
        }
    }

    function removerItem(index) {
        sistemas.splice(index, 1);
        renderizarLista();
    }

    // Inicializa a lista na tela
    renderizarLista();
</script>

</body>
</html>
