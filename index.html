<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro de Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="container">
            <form id="form-cadastro">
                <h2>Novo Cliente</h2>
                <p>Insira os dados para salvar no banco local.</p>

                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="joao@email.com" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="input-group">
                        <label for="nascimento">Nascimento</label>
                        <input type="date" id="nascimento">
                    </div>
                </div>

                <button type="submit" class="btn-enviar">Cadastrar Cliente</button>
            </form>
        </div>

        <div class="lista-container">
            <h3>Clientes Cadastrados</h3>
            <div class="table-responsive">
                <table id="tabela-clientes">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
