<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Vendas Soberano - SPFC</title>
    <style>
        /* --- ESTILO VISUAL TRICOLOR --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: #0d0d0d;
            color: white;
            padding: 20px;
        }

        .main-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h2, h3 {
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff0000, #ffffff, #000000, #ff0000);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: piscaTricolor 4s linear infinite;
            margin-bottom: 20px;
            font-weight: 900;
        }

        @keyframes piscaTricolor {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
            flex: 1;
            min-width: 350px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.1);
        }

        .full-width { flex-basis: 100%; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.85rem; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            outline: none;
        }

        input:focus { border-color: #ff0000; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-salvar { background: #ff0000; color: white; }
        .btn-salvar:hover { background: #fff; color: #000; box-shadow: 0 0 15px #ff0000; }

        .btn-venda { background: #000; border: 2px solid #ff0000; color: white; margin-top: 10px; }
        .btn-venda:hover { background: #333; }

        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #000; color: #ff0000; padding: 12px; border-bottom: 2px solid #fff; }
        td { padding: 12px; border-bottom: 1px solid #333; text-align: center; }

        .total-caixa {
            text-align: right;
            margin-top: 20px;
            font-size: 1.4rem;
            color: #00ff00;
            font-weight: bold;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .escudo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            animation: bounce 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px red);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="card">
        <form id="form-cliente">
            <h2>Novo Cliente</h2>
            <div class="input-group">
                <label>Nome do Sócio/Cliente</label>
                <input type="text" id="nome-cliente" placeholder="Ex: Lucas Moura" required>
            </div>
            <button type="submit" class="btn btn-salvar">Cadastrar no Sistema</button>
        </form>

        <div class="table-container">
            <h3 style="font-size: 1rem; margin-top: 20px;">Clientes Cadastrados</h3>
            <table>
                <thead>
                    <tr><th>Nome</th><th>Ação</th></tr>
                </thead>
                <tbody id="lista-clientes-simples"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <form id="form-venda">
            <h2>Vender Produto</h2>
            <div class="input-group">
                <label>Selecionar Cliente</label>
                <select id="select-venda-cliente" required>
                    <option value="">Aguardando clientes...</option>
                </select>
            </div>
            <div class="input-group">
                <label>Nome do Produto</label>
                <input type="text" id="prod-nome" placeholder="Ex: Camisa Jogo 1" required>
            </div>
            <div class="input-group">
                <label>Preço de Venda (R$)</label>
                <input type="number" id="prod-preco" step="0.01" placeholder="0.00" required>
            </div>
            <button type="submit" class="btn btn-venda">Finalizar Pedido</button>
        </form>
    </div>

    <div class="card full-width">
        <h3>Histórico de Vendas Realizadas</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Produto</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela-vendas"></tbody>
            </table>
        </div>
        <div id="total-caixa" class="total-caixa">Total em Caixa: R$ 0,00</div>
    </div>
</div>

<img class="escudo" src="https://upload.wikimedia.org/wikipedia/pt/4/4b/Sao_Paulo_Futebol_Clube.png">

<script>
    let clientes = JSON.parse(localStorage.getItem('db_clientes_spfc')) || [];
    let vendas = JSON.parse(localStorage.getItem('db_vendas_spfc')) || [];

    document.getElementById('form-cliente').addEventListener('submit', function(e) {
        e.preventDefault();
        const nome = document.getElementById('nome-cliente').value.trim();
        if(nome) {
            clientes.push(nome);
            localStorage.setItem('db_clientes_spfc', JSON.stringify(clientes));
            atualizarClientes();
            document.getElementById('form-cliente').reset();
        }
    });

    function atualizarClientes() {
        const lista = document.getElementById('lista-clientes-simples');
        const select = document.getElementById('select-venda-cliente');
        lista.innerHTML = '';
        select.innerHTML = '<option value="">Selecione um cliente...</option>';
        clientes.forEach((c, i) => {
            lista.innerHTML += `<tr><td>${c}</td><td><button onclick="removerCliente(${i})">Remover</button></td></tr>`;
            select.innerHTML += `<option value="${c}">${c}</option>`;
        });
    }

    function removerCliente(index) {
        clientes.splice(index, 1);
        localStorage.setItem('db_clientes_spfc', JSON.stringify(clientes));
        atualizarClientes();
    }

    document.getElementById('form-venda').addEventListener('submit', function(e) {
        e.preventDefault();
        const cliente = document.getElementById('select-venda-cliente').value;
        const produto = document.getElementById('prod-nome').value.trim();
        const preco = parseFloat(document.getElementById('prod-preco').value);

        if(cliente && produto && preco > 0) {
            const venda = {
                data: new Date().toLocaleString(),
                cliente,
                produto,
                preco
            };
            vendas.push(venda);
            localStorage.setItem('db_vendas_spfc', JSON.stringify(vendas));
            atualizarVendas();
            document.getElementById('form-venda').reset();
        }
    });
