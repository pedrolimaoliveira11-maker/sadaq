<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Soberano - SPFC</title>
    <style>
        /* --- ESTILOS VISUAIS (SÃO PAULO FC) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background-color: #0d0d0d;
            color: white;
            padding: 20px;
        }

        .main-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Efeito Pisca-Pisca nos Títulos */
        h2, h3 {
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff0000, #ffffff, #000000, #ff0000);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pisca 4s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes pisca {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .container, .lista-container {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            flex: 1;
            min-width: 350px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.1);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.8rem; }
        
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            outline: none;
        }

        input:focus { border-color: #ff0000; }

        .btn-enviar {
            width: 100%;
            padding: 12px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-enviar:hover { background: #fff; color: #000; box-shadow: 0 0 15px #ff0000; }

        .btn-venda { background: #000; border: 1px solid #ff0000; margin-top: 10px; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #000; color: #ff0000; padding: 10px; border-bottom: 2px solid #fff; }
        td { padding: 10px; border-bottom: 1px solid #333; text-align: center; }

        /* Escudo Flutuante */
        .escudo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            animation: flutuar 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px red);
        }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <form id="form-cliente">
            <h2>Novo Cliente</h2>
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" required>
            </div>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" required>
            </div>
            <button type="submit" class="btn-enviar">Cadastrar Cliente</button>
        </form>
    </div>

    <div class="container">
        <form id="form-venda">
            <h2>Registrar Venda</h2>
            <div class="input-group">
                <label>Selecionar Cliente</label>
                <select id="select-clientes" required>
                    <option value="">Aguardando clientes...</option>
                </select>
            </div>
            <div class="input-group">
                <label>Produto</label>
                <input type="text" id="produto" required>
            </div>
            <div class="input-group">
                <label>Valor (R$)</label>
                <input type="number" id="valor" required>
            </div>
            <button type="submit" class="btn-enviar btn-venda">Finalizar Venda</button>
        </form>
    </div>

    <div class="lista-container">
        <h3>Lista de Clientes</h3>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                </tr>
            </thead>
            <tbody id="tabela-clientes">
                </tbody>
        </table>
    </div>
</div>

<img class="escudo" src="https://upload.wikimedia.org/wikipedia/pt/4/4b/Sao_Paulo_Futebol_Clube.png">

<script>
    const clientes = [];

    // Lógica para cadastrar cliente
    document.getElementById('form-cliente').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;

        // Adiciona ao array
        clientes.push({ nome, email });

        atualizarInterface();
        this.reset();
    });

    function atualizarInterface() {
        const tabela = document.getElementById('tabela-clientes');
        const select = document.getElementById('select-clientes');

        // Limpa campos
        tabela.innerHTML = "";
        select.innerHTML = '<option value="">Selecione o Cliente...</option>';

        // Preenche Tabela e Select
        clientes.forEach(cliente => {
            // Adiciona na tabela
            const linha = `<tr><td>${cliente.nome}</td><td>${cliente.email}</td></tr>`;
            tabela.innerHTML += linha;

            // Adiciona no select de vendas
            const opcao = document.createElement('option');
            opcao.value = cliente.nome;
            opcao.text = cliente.nome;
            select.appendChild(opcao);
        });
    }

    // Lógica para Venda (apenas alerta para teste)
    document.getElementById('form-venda').addEventListener('submit', function(e) {
        e.preventDefault();
        const cliente = document.getElementById('select-clientes').value;
        const prod = document.getElementById('produto').value;
        alert(`Venda de ${prod} para ${cliente} registrada com sucesso!`);
        this.reset();
    });
</script>

</body>
</html>
