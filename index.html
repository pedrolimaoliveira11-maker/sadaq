<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Soberano Pro - SPFC</title>
    <style>
        /* --- ESTILO TRICOLOR (SÃO PAULO FC) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body {
            background-color: #0a0a0a;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        /* Efeito Pisca-Pisca nos Títulos */
        h2, h3 {
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff0000, #ffffff, #000000, #ff0000);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: piscaTricolor 4s linear infinite;
            margin-bottom: 20px;
            font-weight: 900;
        }

        @keyframes piscaTricolor {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .card {
            background: #151515;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #333;
            flex: 1;
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #bbb; font-size: 0.85rem; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #ff0000; box-shadow: 0 0 8px rgba(255,0,0,0.4); }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-salvar { background: #ff0000; color: white; }
        .btn-salvar:hover { background: #fff; color: #000; box-shadow: 0 0 20px #ff0000; }

        .btn-venda { background: #000; border: 2px solid #ff0000; color: white; margin-top: 10px; }
        .btn-venda:hover { background: #333; border-color: #fff; }

        /* Tabela Estilizada */
        .table-container { width: 100%; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #111; }
        th { background: #000; color: #ff0000; padding: 12px; border-bottom: 2px solid #fff; }
        td { padding: 12px; border-bottom: 1px solid #333; text-align: center; }

        .btn-excluir {
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-excluir:hover { background: #ff4444; color: white; }

        /* Escudo Flutuante */
        .escudo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 70px;
            animation: bounce 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255,0,0,0.6));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="card">
        <form id="form-cliente">
            <h2>Novo Cliente</h2>
            <div class="input-group">
                <label>Nome do Cliente</label>
                <input type="text" id="nome" placeholder="Ex: Rogério Ceni" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="ceni@spfc.com" required>
            </div>
            <button type="submit" class="btn btn-salvar">Cadastrar no Elenco</button>
        </form>
    </div>

    <div class="card">
        <form id="form-venda">
            <h2>Nova Venda</h2>
            <div class="input-group">
                <label>Selecionar Cliente</label>
                <select id="select-venda" required>
                    <option value="">Nenhum cliente cadastrado</option>
                </select>
            </div>
            <div class="input-group">
                <label>Produto</label>
                <input type="text" id="produto" placeholder="Ex: Camisa Jogo 1" required>
            </div>
            <div class="input-group">
                <label>Valor (R$)</label>
                <input type="number" id="valor" step="0.01" required>
            </div>
            <button type="submit" class="btn btn-venda">Finalizar Venda</button>
        </form>
    </div>

    <div class="card" style="flex-basis: 100%;">
        <h3>Lista de Sócios/Clientes</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Gestão</th>
                    </tr>
                </thead>
                <tbody id="lista-clientes">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<img class="escudo" src="https://upload.wikimedia.org/wikipedia/pt/4/4b/Sao_Paulo_Futebol_Clube.png" alt="Escudo SPFC">

<script>
    let clientes = JSON.parse(localStorage.getItem('clientes_spfc')) || [];

    const formCliente = document.getElementById('form-cliente');
    const listaHtml = document.getElementById('lista-clientes');
    const selectVenda = document.getElementById('select-venda');

    // Inicializar página
    renderizar();

    // Cadastrar Cliente
    formCliente.addEventListener('submit', (e) => {
        e.preventDefault();
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;

        clientes.push({ id: Date.now(), nome, email });
        salvarEDesenhagem();
        formCliente.reset();
    });

    // Excluir Cliente
    function excluirCliente(id) {
        clientes = clientes.filter(c => c.id !== id);
        salvarEDesenhagem();
    }

    // Registrar Venda (Simulação)
    document.getElementById('form-venda').addEventListener('submit', (e) => {
        e.preventDefault();
        const clienteNome = selectVenda.value;
        const prod = document.getElementById('produto').value;
        alert(`Sucesso! ${prod} vendido para ${clienteNome}!`);
        e.target.reset();
    });

    function salvarEDesenhagem() {
        localStorage.setItem('clientes_spfc', JSON.stringify(clientes));
        renderizar();
    }

    function renderizar() {
        // Limpar lista e select
        listaHtml.innerHTML = '';
        selectVenda.innerHTML = '<option value="">Selecione o Cliente...</option>';

        if (clientes.length === 0) {
            listaHtml.innerHTML = '<tr><td colspan="3">Nenhum cliente no banco de dados.</td></tr>';
            return;
        }

        clientes.forEach(c => {
            // Tabela
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${c.nome}</td>
                <td>${c.email}</td>
                <td><button class="btn-excluir" onclick="excluirCliente(${c.id})">Apagar</button></td>
            `;
            listaHtml.appendChild(tr);

            // Select de Vendas
            const opt = document.createElement('option');
            opt.value = c.nome;
            opt.textContent = c.nome;
            selectVenda.appendChild(opt);
        });
    }
</script>

</body>
</html>
