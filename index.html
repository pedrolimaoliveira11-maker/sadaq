<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Clientes Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="container">
            <form id="form-cadastro">
                <h2>Novo Cliente</h2>
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva" required>
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="joao@email.com" required>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Telefone</label>
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="input-group">
                        <label>Nascimento</label>
                        <input type="date" id="nascimento">
                    </div>
                </div>
                <button type="submit" class="btn-enviar">Salvar Cliente</button>
            </form>
        </div>

        <div class="lista-container">
            <div class="acoes-tabela">
                <h3>Clientes</h3>
                <button id="btn-exportar" class="btn-secundario">Exportar Excel</button>
            </div>
            
            <div class="input-group">
                <input type="text" id="busca" placeholder="🔍 Buscar cliente pelo nome..." onkeyup="filtrarClientes()">
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
