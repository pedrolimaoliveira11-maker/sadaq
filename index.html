<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistemas de Vendas (Persistente)</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { background-color: #2ecc71; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .delete-btn { background-color: #ff7675; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Meus Sistemas de Vendas</h2>
    <div class="input-group">
        <input type="text" id="sistemaInput" placeholder="Nome do sistema...">
        <button onclick="adicionarItem()">Adicionar</button>
    </div>
    <ul id="listaSistemas"></ul>
</div>

<script>
    // Carrega a lista do armazenamento local ao iniciar
    let sistemas = JSON.parse(localStorage.getItem('minhaListaVendas')) || ["RD Station CRM"];

    function salvarEAtualizar() {
        localStorage.setItem('minhaListaVendas', JSON.stringify(sistemas));
        renderizarLista();
    }

    function renderizarLista() {
        const listaUl = document.getElementById('listaSistemas');
        listaUl.innerHTML = '';
        sistemas.forEach((item, index) => {
            listaUl.innerHTML += `<li>${item} <button class="delete-btn" onclick="removerItem(${index})">X</button></li>`;
        });
    }

    function adicionarItem() {
        const input = document.getElementById('sistemaInput');
        if (input.value.trim() !== "") {
            sistemas.push(input.value);
            input.value = "";
            salvarEAtualizar();
        }
    }

    function removerItem(index) {
        sistemas.splice(index, 1);
        salvarEAtualizar();
    }

    renderizarLista();
</script>
</body>
</html>
